<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLImb — Painel de Admin (local)</title>
<style>
  :root { --bg:#0f1521; --pnl:#161e2d; --pnl2:#1c2638; --bd:#2a3650; --tx:#dce3ee; --fr:#8b99b0; --lj:#ff9900; --vd:#3ecf6f; --vm:#ff5c5c; --az:#58a6ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--tx); font-family:"Segoe UI",system-ui,sans-serif; font-size:14px; }
  header { display:flex; align-items:center; gap:14px; padding:12px 20px; background:var(--pnl); border-bottom:2px solid var(--lj); }
  header h1 { font-size:1.05rem; margin:0; color:var(--lj); }
  header .local { font-size:.72rem; color:var(--fr); background:var(--pnl2); padding:3px 9px; border-radius:9px; }
  header #status { margin-left:auto; font-size:.8rem; }
  nav { display:flex; gap:4px; padding:8px 16px; background:var(--pnl); border-bottom:1px solid var(--bd); flex-wrap:wrap; }
  nav button { background:none; border:none; color:var(--fr); cursor:pointer; padding:7px 13px; border-radius:8px; font-size:.86rem; font-weight:600; }
  nav button.ativa { background:var(--pnl2); color:var(--lj); }
  main { padding:18px 20px; max-width:1100px; margin:0 auto; }
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; margin-bottom:18px; }
  .card { background:var(--pnl); border:1px solid var(--bd); border-radius:10px; padding:13px 15px; }
  .card .n { font-size:1.5rem; font-weight:700; color:var(--lj); }
  .card .l { font-size:.74rem; color:var(--fr); margin-top:2px; }
  .bloco { background:var(--pnl); border:1px solid var(--bd); border-radius:10px; padding:14px 16px; margin-bottom:16px; }
  .bloco h3 { margin:0 0 10px; font-size:.95rem; }
  table { width:100%; border-collapse:collapse; font-size:.82rem; }
  th,td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--bd); }
  th { color:var(--fr); font-size:.72rem; text-transform:uppercase; }
  .btn { background:var(--lj); color:#1a1205; border:none; padding:6px 12px; border-radius:7px; font-weight:700; cursor:pointer; font-size:.8rem; }
  .btn.sec { background:var(--pnl2); color:var(--tx); border:1px solid var(--bd); }
  .btn.perigo { background:transparent; color:var(--vm); border:1px solid var(--vm); }
  .btn.mini { padding:3px 8px; font-size:.72rem; margin:1px; }
  input,select { background:var(--pnl2); border:1px solid var(--bd); color:var(--tx); border-radius:7px; padding:7px 10px; font-size:.84rem; }
  .linha { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:10px; }
  .tag { font-size:.68rem; padding:1px 7px; border-radius:9px; font-weight:700; }
  .tag.pro { background:rgba(255,153,0,.15); color:var(--lj); }
  .tag.free { background:var(--pnl2); color:var(--fr); }
  .tag.ban { background:rgba(255,92,92,.15); color:var(--vm); }
  .tag.ok { background:rgba(62,207,111,.15); color:var(--vd); }
  .vazio { color:var(--fr); padding:10px 0; }
  .nota { color:var(--fr); font-size:.78rem; }
  code { background:var(--pnl2); padding:1px 5px; border-radius:4px; color:var(--lj); }
  .erro { color:var(--vm); }
</style>
</head>
<body>
<header>
  <h1>🛠️ CLImb — Admin</h1>
  <span class="local">local · só no seu PC</span>
  <span id="status"></span>
</header>
<nav>
  <button data-aba="resumo" class="ativa">📊 Resumo</button>
  <button data-aba="usuarios">👤 Usuários</button>
  <button data-aba="codigos">🎟️ Códigos</button>
  <button data-aba="eventos">📅 Eventos</button>
  <button data-aba="alertas">🚨 Alertas</button>
  <button data-aba="auditoria">🛡️ Auditoria</button>
</nav>
<main id="conteudo"></main>

<script>
const el = document.getElementById("conteudo");
let abaAtual = "resumo";

async function api(caminho, metodo, corpo) {
  const r = await fetch("/admin/" + caminho, {
    method: metodo || "GET",
    headers: { "Content-Type": "application/json" },
    body: corpo ? JSON.stringify(corpo) : undefined,
  });
  const txt = await r.text();
  let j = {}; try { j = JSON.parse(txt); } catch (e) {}
  if (!r.ok) throw new Error(j.erro || ("erro " + r.status));
  return j;
}
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function dt(ms){ return ms ? new Date(ms).toLocaleString("pt-BR") : "—"; }
function dia(ms){ return ms ? new Date(ms).toLocaleDateString("pt-BR") : "—"; }

document.querySelectorAll("nav button").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll("nav button").forEach(x => x.classList.toggle("ativa", x === b));
  abaAtual = b.dataset.aba; render();
}));

async function ping() {
  try { await api("resumo"); document.getElementById("status").innerHTML = '<span style="color:var(--vd)">● conectado</span>'; }
  catch (e) { document.getElementById("status").innerHTML = '<span style="color:var(--vm)">● ' + esc(e.message) + '</span>'; }
}

function render() {
  el.innerHTML = "<p class='nota'>Carregando…</p>";
  if (abaAtual === "resumo") return verResumo();
  if (abaAtual === "usuarios") return verUsuarios();
  if (abaAtual === "codigos") return verCodigos();
  if (abaAtual === "eventos") return verEventos();
  if (abaAtual === "alertas") return verAlertas();
  if (abaAtual === "auditoria") return verAuditoria();
}

async function verResumo() {
  try {
    const r = await api("resumo");
    const card = (n, l) => `<div class="card"><div class="n">${n}</div><div class="l">${l}</div></div>`;
    const reqDias = (r.reqPorDia || []).slice(-14).map(d => `${d.dia.slice(5)}: ${d.req}`).join(" · ");
    el.innerHTML = `
      <div class="cards">
        ${card(r.usuarios, "usuários")}
        ${card(r.ativos24h, "ativos 24h")}
        ${card(r.ativos7d, "ativos 7d")}
        ${card(r.ativos30d, "ativos 30d")}
        ${card(r.pro, "contas Pro")}
        ${card(r.turmas, "turmas")}
        ${card(r.alertas, "alertas")}
        ${card(r.eventosAtivos, "eventos ativos")}
      </div>
      <div class="bloco">
        <h3>💸 Custo estimado do mês (${esc(r.custo.mes)})</h3>
        <p style="font-size:1.6rem;font-weight:700;color:var(--lj);margin:0">US$ ${r.custo.estimativaUSD.toFixed(2)}</p>
        <p class="nota">~${r.custo.horasAtivasEstim}h de máquina ativa no mês · ${esc(r.custo.nota)}</p>
      </div>
      <div class="bloco">
        <h3>📈 Uso da máquina</h3>
        <p>Uptime atual: <b>${r.uptimeMin} min</b> · Requisições desde o boot: <b>${r.reqDesdeBoot}</b> · Média/dia (30d): <b>${r.reqMediaDia}</b></p>
        <p class="nota">Requisições por dia (14 dias): ${esc(reqDias) || "—"}</p>
      </div>
      <div class="linha"><button class="btn sec" onclick="baixarBackup()">⬇️ Baixar backup do banco (JSON)</button></div>`;
  } catch (e) { el.innerHTML = `<p class="erro">${esc(e.message)}</p>`; }
}

async function verUsuarios(busca) {
  try {
    const r = await api("usuarios" + (busca ? "?busca=" + encodeURIComponent(busca) : ""));
    const linhas = r.usuarios.map(u => {
      const lic = u.licenca.pro ? `<span class="tag pro">${esc(u.licenca.tier)}</span>` : `<span class="tag free">free</span>`;
      const mail = u.email ? esc(u.email) + (u.emailVerificado ? ' <span class="tag ok">✓</span>' : ' <span class="tag free">?</span>') : "—";
      return `<tr>
        <td><b>${esc(u.usuario)}</b>${u.banido ? ' <span class="tag ban">banido</span>' : ''}${u.google ? ' <span class="tag free">google</span>' : ''}${u.twofa ? ' 🔐' : ''}</td>
        <td>${u.xp} XP</td><td>${lic}</td><td style="font-size:.76rem">${mail}</td>
        <td style="font-size:.74rem">${dia(u.ultimoAcesso)}</td>
        <td>
          <button class="btn mini sec" onclick="aXp('${esc(u.usuario)}',${u.xp},${u.melhorStreak})">XP</button>
          <button class="btn mini sec" onclick="aLic('${esc(u.usuario)}')">Licença</button>
          <button class="btn mini sec" onclick="aSenha('${esc(u.usuario)}')">Senha</button>
          ${u.email && !u.emailVerificado ? `<button class="btn mini sec" onclick="aVerif('${esc(u.usuario)}')">Verificar e-mail</button>` : ''}
          <button class="btn mini ${u.banido ? 'sec' : 'perigo'}" onclick="aBan('${esc(u.usuario)}',${u.banido ? 'false' : 'true'})">${u.banido ? 'Desbanir' : 'Banir'}</button>
          <button class="btn mini perigo" onclick="aApagar('${esc(u.usuario)}')">Apagar</button>
        </td></tr>`;
    }).join("");
    el.innerHTML = `
      <div class="linha">
        <input id="busca" placeholder="buscar por usuário ou e-mail" value="${esc(busca || '')}" style="flex:1;max-width:320px">
        <button class="btn" onclick="verUsuarios(document.getElementById('busca').value)">Buscar</button>
        <span class="nota">${r.total} conta(s) no total</span>
      </div>
      <div class="bloco"><table><thead><tr><th>Usuário</th><th>XP</th><th>Licença</th><th>E-mail</th><th>Último acesso</th><th></th></tr></thead><tbody>${linhas || '<tr><td colspan=6 class=vazio>nada</td></tr>'}</tbody></table></div>`;
    const inp = document.getElementById("busca");
    inp.addEventListener("keydown", e => { if (e.key === "Enter") verUsuarios(inp.value); });
  } catch (e) { el.innerHTML = `<p class="erro">${esc(e.message)}</p>`; }
}
async function acao(fn, ok) { try { await fn(); if (ok) alert(ok); render(); } catch (e) { alert("Erro: " + e.message); } }
function aXp(u, xp, st) { const nv = prompt(`Novo XP de ${u}:`, xp); if (nv === null) return; const ns = prompt("Novo recorde de sequência:", st); acao(() => api("usuario/xp", "POST", { usuario: u, xp: Number(nv), melhorStreak: Number(ns) })); }
function aLic(u) { const t = prompt("Tier (free, mensal, semestral, anual, vitalicio, escola):", "vitalicio"); if (!t) return; const d = (t==="vitalicio"||t==="free") ? null : prompt("Dias (vazio = padrão do tier):", ""); acao(() => api("usuario/licenca", "POST", { usuario: u, tier: t, dias: d || undefined }), "Licença atualizada."); }
function aSenha(u) { acao(async () => { const r = await api("usuario/senha", "POST", { usuario: u }); prompt("Link de redefinição (válido 1h)" + (r.enviadoPara ? " — também enviei por e-mail" : "") + ":", r.link); }); }
function aVerif(u) { acao(() => api("usuario/verificar-email", "POST", { usuario: u }), "E-mail marcado como verificado."); }
function aBan(u, banir) { const m = banir ? prompt("Motivo (opcional):", "") : ""; if (banir && m === null) return; acao(() => api("usuario/banir", "POST", { usuario: u, banir, motivo: m })); }
function aApagar(u) { if (!confirm("APAGAR a conta " + u + "? Isso é definitivo.")) return; acao(() => api("usuario/apagar", "POST", { usuario: u }), "Conta apagada."); }

async function verCodigos() {
  try {
    const r = await api("codigos");
    const linhas = r.codigos.map(c => `<tr><td><code>${esc(c.codigo)}</code></td><td>${esc(c.tier)}</td><td>${c.dias || "—"}</td><td>${c.usadoPor ? esc(c.usadoPor) : '<span class="tag ok">livre</span>'}</td></tr>`).join("");
    el.innerHTML = `
      <div class="bloco"><h3>Gerar códigos de ativação</h3>
        <div class="linha">
          <select id="cTier"><option>mensal</option><option>semestral</option><option>anual</option><option>vitalicio</option><option>escola</option></select>
          <input id="cQtd" type="number" min="1" max="100" value="1" style="width:80px" placeholder="qtd">
          <input id="cDias" type="number" min="1" style="width:100px" placeholder="dias (opc)">
          <button class="btn" onclick="gerarCodigo()">Gerar</button>
        </div>
        <div id="cGerados"></div>
      </div>
      <div class="bloco"><h3>Códigos (${r.codigos.length})</h3><table><thead><tr><th>Código</th><th>Tier</th><th>Dias</th><th>Usado por</th></tr></thead><tbody>${linhas || '<tr><td colspan=4 class=vazio>nenhum</td></tr>'}</tbody></table></div>`;
  } catch (e) { el.innerHTML = `<p class="erro">${esc(e.message)}</p>`; }
}
async function gerarCodigo() {
  const tier = document.getElementById("cTier").value;
  const qtd = Number(document.getElementById("cQtd").value) || 1;
  const dias = document.getElementById("cDias").value;
  try { const r = await api("codigo", "POST", { tier, qtd, dias: dias || undefined }); document.getElementById("cGerados").innerHTML = "<p>Gerados:</p>" + r.gerados.map(c => `<div><code>${esc(c)}</code></div>`).join(""); verCodigos(); }
  catch (e) { alert("Erro: " + e.message); }
}

async function verEventos() {
  try {
    const r = await api("eventos");
    const linhas = (r.eventos || []).map(e => `<tr><td><b>${esc(e.titulo)}</b><br><span class="nota">${esc(e.mensagem || "")}</span></td><td>${esc(e.tipo)}</td><td style="font-size:.74rem">${e.fim ? "até " + dt(e.fim) : "sem prazo"}</td><td><button class="btn mini perigo" onclick="apagarEvento('${esc(e.id)}')">Apagar</button></td></tr>`).join("");
    el.innerHTML = `
      <div class="bloco"><h3>Criar evento / aviso</h3>
        <div class="linha"><input id="eTit" placeholder="título" style="flex:1;max-width:340px"></div>
        <div class="linha"><input id="eMsg" placeholder="mensagem (aparece pros usuários)" style="flex:1;max-width:480px"></div>
        <div class="linha">
          <select id="eTipo"><option value="aviso">aviso</option><option value="competicao">competição</option></select>
          <input id="eFim" type="datetime-local" title="fim (opcional)">
          <button class="btn" onclick="criarEvento()">Publicar</button>
        </div>
        <p class="nota">Avisos sem prazo ficam ativos até você apagar. Os ativos aparecem pra galera no app.</p>
      </div>
      <div class="bloco"><h3>Eventos</h3><table><thead><tr><th>Evento</th><th>Tipo</th><th>Prazo</th><th></th></tr></thead><tbody>${linhas || '<tr><td colspan=4 class=vazio>nenhum</td></tr>'}</tbody></table></div>`;
  } catch (e) { el.innerHTML = `<p class="erro">${esc(e.message)}</p>`; }
}
async function criarEvento() {
  const titulo = document.getElementById("eTit").value.trim();
  if (!titulo) return alert("Dê um título.");
  const mensagem = document.getElementById("eMsg").value;
  const tipo = document.getElementById("eTipo").value;
  const fimRaw = document.getElementById("eFim").value;
  const fim = fimRaw ? new Date(fimRaw).getTime() : null;
  try { await api("evento", "POST", { titulo, mensagem, tipo, fim }); render(); } catch (e) { alert("Erro: " + e.message); }
}
function apagarEvento(id) { if (!confirm("Apagar evento?")) return; api("evento/apagar", "POST", { id }).then(render).catch(e => alert(e.message)); }

async function verAlertas() {
  try {
    const r = await api("alertas");
    const linhas = (r.alertas || []).map(a => `<tr><td style="font-size:.74rem">${esc((a.quando||"").replace("T"," ").slice(0,19))}</td><td>${esc(a.tipo)}</td><td>${esc(a.detalhe || "")}</td></tr>`).join("");
    el.innerHTML = `
      <div class="linha"><h3 style="margin:0;flex:1">🚨 Alertas antifraude</h3>${(r.alertas||[]).length ? '<button class="btn sec" onclick="limparAlertas()">Limpar todos</button>' : ''}</div>
      <div class="bloco"><table><thead><tr><th>Quando</th><th>Tipo</th><th>Detalhe</th></tr></thead><tbody>${linhas || '<tr><td colspan=3 class=vazio>nenhum alerta 🎉</td></tr>'}</tbody></table></div>`;
  } catch (e) { el.innerHTML = `<p class="erro">${esc(e.message)}</p>`; }
}
function limparAlertas() { if (!confirm("Limpar todos os alertas?")) return; api("alertas/limpar", "POST", {}).then(render).catch(e => alert(e.message)); }

async function verAuditoria() {
  try {
    const r = await api("log");
    const linhas = (r.log || []).map(l => `<tr><td style="font-size:.74rem">${esc((l.quando||"").replace("T"," ").slice(0,19))}</td><td>${esc(l.acao)}</td><td>${esc(l.detalhe||"")}</td></tr>`).join("");
    el.innerHTML = `<div class="bloco"><h3>🛡️ Log de ações do admin (últimas 200)</h3><table><thead><tr><th>Quando</th><th>Ação</th><th>Detalhe</th></tr></thead><tbody>${linhas || '<tr><td colspan=3 class=vazio>nada ainda</td></tr>'}</tbody></table></div>`;
  } catch (e) { el.innerHTML = `<p class="erro">${esc(e.message)}</p>`; }
}

async function baixarBackup() {
  try {
    const r = await api("backup");
    const blob = new Blob([JSON.stringify(r, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "climb-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
  } catch (e) { alert("Erro: " + e.message); }
}

ping(); render();
</script>
</body>
</html>
