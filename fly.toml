app = "aws-cli-quest"
primary_region = "gru"

[build]

[env]
  PORT = "8080"
  DADOS_DIR = "/dados"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "dados"
  destination = "/dados"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
