<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ AWS CLI Quest — aprenda AWS CLI jogando</title>
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

  <header>
    <div class="logo">⚡ AWS CLI Quest</div>
    <div class="nivel-box">
      <span id="tituloNivel"></span>
      <div class="barra"><div id="barraXp"></div></div>
      <span id="textoXp"></span>
    </div>
    <div class="streak" id="streakBox" title="Sequência de acertos — cada acerto seguido dá +10% de XP (máx. +50%)">
      🔥 <span id="streakNum">0</span>
      <small id="streakBonus"></small>
    </div>
    <button class="botao" id="btnRanking">🏆 Ranking</button>
  </header>

  <main>
    <aside id="sidebar"></aside>

    <section class="centro">
      <div id="cardDesafio"></div>

      <div id="terminal">
        <div id="saidaTerminal"></div>
        <div class="linha-entrada">
          <span class="prompt">aws-quest&nbsp;$</span>
          <input id="entradaTerminal" autocomplete="off" autocapitalize="off" spellcheck="false">
        </div>
      </div>
    </section>
  </main>

  <footer>
    <span>💡 Manuais: <strong>aws help</strong> · <strong>aws s3 help</strong> · <strong>aws s3 mb help</strong> — arquivos locais: <strong>ls</strong></span>
    <button class="botao perigo" id="btnResetar">Resetar progresso</button>
  </footer>

  <!-- Modal: ranking -->
  <div class="modal" id="modalRanking">
    <div class="modal-caixa">
      <h2>🏆 Ranking da comunidade</h2>
      <table class="ranking"><tbody id="corpoRanking"></tbody></table>
      <div class="linha-nome">
        <input id="nomeJogador" maxlength="20" placeholder="Seu nome no ranking">
        <button class="botao" id="btnSalvarNome">Salvar nome</button>
      </div>
      <div class="modal-acoes">
        <button class="botao secundario" data-fechar>Fechar</button>
      </div>
    </div>
  </div>

  <!-- Modal: confirmar revelação da resposta -->
  <div class="modal" id="modalRevelar">
    <div class="modal-caixa">
      <h2>👁️ Revelar resposta?</h2>
      <p id="revelarTexto"></p>
      <div class="modal-acoes">
        <button class="botao secundario" data-fechar>Voltar e tentar</button>
        <button class="botao perigo" id="btnConfirmaRevelar">Revelar mesmo assim</button>
      </div>
    </div>
  </div>

  <div id="toasts"></div>

  <script src="js/simulador.js"></script>
  <script src="js/manuais.js"></script>
  <script src="js/desafios.js"></script>
  <script src="js/jogo.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
